name: 'Get GitHub Revision Info'
description: 'Get GitHub revision information'

outputs:
  sha:
    description: 'Revision SHA'
    value: ${{ steps.get-revision.outputs.sha }}
  ref:
    description: 'Revision ref'
    value: ${{ steps.get-revision.outputs.ref }}
  branch:
    description: 'Revision ref (deprecated)'
    value: ${{ steps.get-revision.outputs.ref }}

runs:
  using: 'composite'
  steps:
    - name: Get revision SHA and ref
      id: get-revision
      env:
        EVENT_NAME: ${{ github.event_name }}
        EVENT_PR_MERGED: ${{ github.event.pull_request.merged }}
        EVENT_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        EVENT_PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      run: |
        if [[ "$EVENT_NAME" == "pull_request" ]]; then
          if [[ "$EVENT_PR_MERGED" == true ]]; then
            sha="$GITHUB_SHA"
            ref="$GITHUB_BASE_REF"
            echo "Event ${EVENT_NAME} (merged):"
          else
            sha="$EVENT_PR_HEAD_SHA"
            ref="$EVENT_PR_HEAD_REF"
            echo "Event ${EVENT_NAME} (not merged):"
          fi
        else
          sha="$GITHUB_SHA"
          ref="$GITHUB_REF_NAME"
          echo "Event ${EVENT_NAME}:"
        fi

        {
          echo "sha=${sha}"
          echo "ref=${ref}"
        } >> "$GITHUB_OUTPUT"

        echo "  SHA: ${sha}"
        echo "  Ref: ${ref}"
      shell: bash
