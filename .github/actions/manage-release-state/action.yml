name: 'Manage Release State'
description: 'Manage release state in GitHub issues'

inputs:
  action:
    description: 'Action to perform: "create", "get", "update" or "finalize"'
    required: true
  components-path:
    description: 'Path to components JSON file'
    required: true
  issue-number:
    description: >
      Issue number to manage. Required for "get", "update", "finalize" actions
      if "version" is not provided.
    required: false
  target-components:
    description: 'JSON array of component names to update (for "update" action)'
    default: '[]'
  target-status:
    description: >
      Component status: "triggered", "tagged", "pr-created", "pr-merged" or
      "complete" (for "update" action)
    required: false
  target-pr-number:
    description: >
      Number of created PR (for "update" action with "pr-created" status)
    required: false
  metadata-overwrite-tags:
    description: >
      Whether existing tags should be overwritten (for "create" action).
      This is only stored as metadata for the caller.
    default: 'false'
  version:
    description: >
      Release version. Required for "create" action. Can be used as an
      alternative to "issue-number" for finding the tracking issue.
    required: false
  project-name:
    description: >
      Name of the project to add the tracking issue to (for "create" action)
    required: false
  project-column:
    description: >
      Column of the project to add the tracking issue to (for "create" action).
      Effective only if "project-name" is set.
    required: false
  reset:
    description: >
      Whether to reset component state before applying updates
      (for "update" action)
    default: 'false'
  close-on-finalization:
    description: >
      Whether to close the issue on finalization (for "finalize" action)
    default: 'true'
  fail-on-no-issue:
    description: >
      Whether to fail if no tracking issue is found
      (for "get", "update", "finalize" actions)
    default: 'true'
  repository:
    description: >
      Repository hosting the tracking issue. Defaults to $GITHUB_REPOSITORY.
    required: false
  user-login:
    description: 'Login of the user posting the state comments'
    default: 'github-actions[bot]'
  token:
    description: 'Access token used to manage the GitHub issue'
    default: ${{ github.token }}

outputs:
  issue-number:
    description: 'The number of the corresponding release issue'
    value: ${{ steps.set-outputs.outputs.issue-number }}
  issue-url:
    description: 'The URL of the corresponding release issue'
    value: ${{ steps.set-outputs.outputs.issue-url }}
  state:
    description: 'Current state as JSON'
    value: ${{ steps.set-outputs.outputs.state }}
  components-path:
    description: 'Path to updated components JSON file, including state'
    value: ${{ steps.set-outputs.outputs.components-path }}
  metadata-overwrite-tags:
    description: 'Metadata about whether existing tags should be overwritten'
    value: ${{ steps.set-outputs.outputs.metadata-overwrite-tags }}

runs:
  using: 'composite'
  steps:
    - name: Prepare action
      id: prepare
      env:
        ACTION: ${{ inputs.action }}
        REPOSITORY: ${{ inputs.repository }}
      run: |
        case "$ACTION" in
          create | \
          get | \
          update | \
          finalize \
          )
            ;;  # valid
          *)
            echo "::error::Unknown action: ${ACTION}"
            exit 1
            ;;
        esac

        echo "repo=${REPOSITORY:-"$GITHUB_REPOSITORY"}" \
          >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Find tracking issue
      id: find-issue
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPO: ${{ steps.prepare.outputs.repo }}
        ACTION: ${{ inputs.action }}
        ISSUE_NUMBER: ${{ inputs.issue-number }}
        VERSION: ${{ inputs.version }}
        FAIL_ON_NO_ISSUE: ${{ inputs.fail-on-no-issue }}
      run: |
        RELEASE_LABEL="release-v${VERSION}"

        if [[ -n "$ISSUE_NUMBER" ]]; then
          issue_json=$(gh issue view "$ISSUE_NUMBER" \
            --repo "$REPO" --json labels,number,url 2>/dev/null)

          if [[ -z "$VERSION" ]] || \
            jq -e --arg label "$RELEASE_LABEL" \
            '.labels[].name | select(. == $label)' <<< "$issue_json" &>/dev/null
          then
            issue_num=$(jq -r '.number' <<< "$issue_json")
            issue_url=$(jq -r '.url' <<< "$issue_json")
          else
            echo "Issue ${REPO}#${ISSUE_NUMBER} is not a tracking issue for v${VERSION}"
          fi
        else
          issue_json=$(gh issue list \
            --repo "$REPO" \
            --label "$RELEASE_LABEL" \
            --state open \
            --json number,url --jq '.[0]')

          issue_num=$(jq -r '.number' <<< "$issue_json")
          issue_url=$(jq -r '.url' <<< "$issue_json")
        fi

        if [[ -z "$issue_num" ]]; then
          if [[ "$ACTION" == 'create' ]] ||
            [[ "$FAIL_ON_NO_ISSUE" == 'false' ]]
          then
            echo 'issue-exists=false' >> "$GITHUB_OUTPUT"
            echo "No tracking issue found for v${VERSION}"
            exit 0
          else
            echo "::error::No tracking issue found for v${VERSION}"
            exit 1
          fi
        fi

        {
          echo 'issue-exists=true'
          echo "issue-number=${issue_num}"
          echo "issue-url=${issue_url}"
        } >> "$GITHUB_OUTPUT"
        echo "Using tracking issue ${REPO}#${issue_num} for version ${VERSION}"
      shell: bash

    - name: Initialize new state
      id: initialize-state
      if: >-
        inputs.action == 'create' &&
        steps.find-issue.outputs.issue-exists == 'false'
      env:
        VERSION: ${{ inputs.version }}
        COMPONENTS_PATH: ${{ inputs.components-path }}
        METADATA_OVERWRITE_TAGS: ${{ inputs.metadata-overwrite-tags }}
      run: |
        if [[ -z "$VERSION" ]]; then
          echo "::error::No version provided to create release issue"
          exit 1
        fi
        echo "Creating initial state for version ${VERSION}..."

        component_names=$(jq -c 'keys' "$COMPONENTS_PATH")
        timestamp=$(date -u +'%Y-%m-%d %H:%M %Z')

        state=$(jq -n \
          --arg version "$VERSION" \
          --arg actor "$GITHUB_ACTOR" \
          --arg timestamp "$timestamp" \
          --arg overwrite_tags "$METADATA_OVERWRITE_TAGS" \
          --argjson pending "$component_names" '
          {
            pending: $pending,
            triggered: [],
            pr_created: [],
            pr_merged: [],
            tagged: [],
            completed: [],
            metadata: {
              version: $version,
              release_name: "",
              release_url: "",
              triggered_by: $actor,
              created_at: $timestamp,
              component_prs: [],
              overwrite_tags: $overwrite_tags
            }
          }')

        {
          echo "version=${VERSION}"
          echo "updated-at=${timestamp}"
          echo 'state<<EOF'
          echo "$state"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

        echo "Initial state created"
      shell: bash

    - name: Fetch current state from issue
      id: fetch-state
      if: steps.find-issue.outputs.issue-exists == 'true'
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPO: ${{ steps.prepare.outputs.repo }}
        ISSUE_NUMBER: ${{ steps.find-issue.outputs.issue-number }}
        USER_LOGIN: ${{ inputs.user-login }}
        TARGET_COMPONENTS: ${{ inputs.target-components }}
      run: |
        echo "Fetching state from issue #${ISSUE_NUMBER}..."

        state=$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
          --paginate 2>/dev/null |
          jq \
            --arg login "$USER_LOGIN" '
              [
                .[]
                | select(.user.login == $login)
                | select(.body | contains("```json"))
                | .body
                | split("```json\n")[1]
                | split("\n```")[0]
              ]
              | last
              | fromjson
            ')

        if [[ -z "$state" ]]; then
          echo "::error::No state found from ${USER_LOGIN}"
          echo "This likely means the issue hasn't been initialized yet"
          exit 1
        fi

        if ! jq empty <<< "$state" 2>/dev/null; then
          echo "::error::State is not valid JSON"
          exit 1
        fi

        state=$(jq -n \
          --argjson state "$state" '
          {
            pending:    [],
            triggered:  [],
            pr_created: [],
            pr_merged:  [],
            tagged:     [],
            completed:  [],
            metadata: {
              version:       null,
              release_name:  null,
              release_url:   null,
              triggered_by:  null,
              created_at:    null,
              component_prs: [],
              overwrite_tags: null
            }
          } as $defaults
          | ($defaults + ($state // {})
            | .metadata = ($defaults.metadata + (($state // {}).metadata // {}))
            ) as $s
          | $s
        ')

        version=$(jq -r '.metadata.version' <<< "$state")
        timestamp=$(date -u +'%Y-%m-%d %H:%M %Z')

        {
          echo "version=${version}"
          echo "updated-at=${timestamp}"
          echo 'state<<EOF'
          echo "$state"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

        echo "State fetched successfully"
      shell: bash

    - name: Update component state
      id: update-state
      if: steps.fetch-state.outputs.state
      env:
        GH_TOKEN: ${{ inputs.token }}
        ACTION: ${{ inputs.action }}
        VERSION: ${{ steps.fetch-state.outputs.version }}
        TARGET_COMPONENTS: ${{ inputs.target-components }}
        STATUS: ${{ inputs.target-status }}
        STATE: ${{ steps.fetch-state.outputs.state }}
        PR_NUMBER: ${{ inputs.target-pr-number }}
        METADATA_OVERWRITE_TAGS: ${{ inputs.metadata-overwrite-tags }}
        RESET: ${{ inputs.reset }}
      run: |
        if [[ "$TARGET_COMPONENTS" != '[]' ]]; then
          echo "Updating ${TARGET_COMPONENTS} status to: ${STATUS}"
        else
          echo "Updating state"
        fi

        release_name=
        release_url=
        if jq -e '.metadata.release_name | . == null or . == ""' <<< "$STATE" \
          > /dev/null || [[ "$ACTION" == 'finalize' ]]
        then
          release=$(gh release view "v${VERSION}" --json name,url 2>/dev/null ||
            true)
          if [[ -n "$release" ]]; then
            release_name=$(jq -r '.name' <<< "$release")
            release_url=$(jq -r '.url' <<< "$release")
          fi
        fi

        updated_state=$(jq \
          --argjson comps "$TARGET_COMPONENTS" \
          --arg status "$STATUS" \
          --arg action "$ACTION" \
          --arg release_name "$release_name" \
          --arg release_url "$release_url" \
          --arg owner "$GITHUB_REPOSITORY_OWNER" \
          --arg pr_number "$PR_NUMBER" \
          --arg overwrite_tags "$METADATA_OVERWRITE_TAGS" \
          --argjson reset "$RESET" '
          ($comps | flatten) as $c
          | [
              "pending", "triggered", "pr_created", "pr_merged",
              "tagged", "completed"
            ] as $all_fields
          | {
              "pending":    "pending",
              "triggered":  "triggered",
              "pr-created": "pr_created",
              "pr-merged":  "pr_merged",
              "tagged":     "tagged",
              "complete":   "completed"
            } as $transitions
          | $transitions[$status] as $target
          # Fail if status unknown
          | if ($c | length) > 0 and $target == null
            then error("Unknown status: \($status)")
            else . end
          # Fail if any component does not exist
          | ([$all_fields[] as $f | .[$f][]?] | unique) as $existing
          | if ($c | length) > 0
              and (($c | all(. as $x | $existing | index($x) != null)) | not)
            then error("One or more components do not exist in state")
            else . end
          # Remove from all fields, add to target
          | if ($c | length) > 0 then
              reduce $all_fields[] as $f
                (. ; .[$f] = (
                  if $f == $target
                  then ((.[$f] // []) + $c | unique)
                  else ((.[$f] // []) - $c)
                  end
                ))
            else .
            end
          # Update component_prs if pr-created
          | if ($c | length) > 0 and $status == "pr-created"
              and ($pr_number | length) > 0 then
              (
                $c | map({
                  name: .,
                  pr: "\($owner)/\(.)#\($pr_number)"
                })
              ) as $new_prs
              | .metadata.component_prs = (
                  ($new_prs + (.metadata.component_prs // []))
                  | unique_by(.name)
                )
            else .
            end
          # If reset, move all non-target components to pending
          | if $reset then
              ($existing - $c) as $rest
              | .pending = (.pending + $rest | unique)
              | reduce (
                  $all_fields[] | select(. != "pending" and . != $target)
                ) as $f
                  (. ; .[$f] = [])
              | .metadata.component_prs = []
            else .
            end
          # If action is create, set caller metadata
          | if $action == "create" then
              .metadata += {
                overwrite_tags: $overwrite_tags
              }
            else .
            end
          | if ($release_name | length) > 0 then
              .metadata.release_name = $release_name
            else . end
          | if ($release_url | length) > 0 then
              .metadata.release_url = $release_url
            else . end
        ' <<< "$STATE")

        if jq -en \
          --argjson previous "$STATE" \
          --argjson updated "$updated_state" \
          '$previous == $updated' > /dev/null
        then
          has_changes=false
        else
          has_changes=true
        fi

        {
          echo "has-changes=${has_changes}"
          echo 'state<<EOF'
          echo "$updated_state"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Update components JSON with state
      id: update-components
      if: >-
        steps.update-state.outputs.state ||
        steps.fetch-state.outputs.state ||
        steps.initialize-state.outputs.state
      env:
        PREVIOUS_STATE: ${{ steps.fetch-state.outputs.state }}
        STATE: >-
          ${{ steps.update-state.outputs.state ||
            steps.fetch-state.outputs.state ||
            steps.initialize-state.outputs.state }}
        COMPONENTS_PATH: ${{ inputs.components-path }}
      run: |
        UPDATED_COMPONENTS_PATH="${RUNNER_TEMP}/updated-components.json"
        TMP_PATH="${RUNNER_TEMP}/.updated-components.json"

        previous_state=${PREVIOUS_STATE:-'{}'}
        jq \
          --argjson previous "$previous_state" \
          --argjson state "$STATE" '
          def status_of(key; $s):
            if ($s == null or $s == {}) then "uninitialized"
            elif (key | IN($s.completed[])) then "complete"
            elif (key | IN($s.tagged[])) then "tagged"
            elif (key | IN($s.pr_merged[])) then "pr-merged"
            elif (key | IN($s.pr_created[])) then "pr-created"
            elif (key | IN($s.triggered[])) then "triggered"
            elif (key | IN($s.pending[])) then "pending"
            else "unknown"
            end;
          with_entries(
            .value += {
              previous_status: status_of(.key; $previous),
              status:          status_of(.key; $state)
            }
          )
          | to_entries
          | map(
              . as $entry
              | .value += (
                  ($state.metadata.component_prs // [])
                  | map(select(.name == $entry.key))
                  | first
                  // {}
                )
            )
          | from_entries
        ' "$COMPONENTS_PATH" > "$TMP_PATH"
        mv "$TMP_PATH" "$UPDATED_COMPONENTS_PATH"

        {
          echo 'state<<EOF'
          echo "$STATE"
          echo 'EOF'
          echo "updated-components-path=${UPDATED_COMPONENTS_PATH}"
        } >> "$GITHUB_OUTPUT"
        echo "Generated updated components at ${UPDATED_COMPONENTS_PATH}"
      shell: bash

    - name: Generate template data
      id: generate-data
      if: >-
        inputs.action == 'create' ||
        inputs.action == 'finalize' ||
        steps.update-state.outputs.has-changes == 'true'
      env:
        ACTION: ${{ inputs.action }}
        VERSION: >-
          ${{ steps.fetch-state.outputs.version ||
            steps.initialize-state.outputs.version }}
        UPDATED_AT: >-
          ${{ steps.fetch-state.outputs.updated-at ||
            steps.initialize-state.outputs.updated-at }}
        STATE: ${{ steps.update-components.outputs.state }}
        COMPONENTS_PATH: >-
          ${{ steps.update-components.outputs.updated-components-path }}
      run: |
        TEMPLATE_DATA_PATH="${RUNNER_TEMP}/release-template-data.json"

        jq \
          --arg action "$ACTION" \
          --arg version "$VERSION" \
          --arg updated_at "$UPDATED_AT" \
          --argjson state "$STATE" '
          {
            action: $action,
            version: $version,
            created_at: $state.metadata.created_at,
            updated_at: $updated_at,
            triggered_by: $state.metadata.triggered_by,
            release_name: $state.metadata.release_name,
            release_url: $state.metadata.release_url,
            state: $state,
            components: .
          }
        ' "$COMPONENTS_PATH" > "$TEMPLATE_DATA_PATH"

        echo "template-data-path=${TEMPLATE_DATA_PATH}" \
          >> "$GITHUB_OUTPUT"
        echo "Generated template data at ${TEMPLATE_DATA_PATH}"
      shell: bash

    - name: Render tracking issue
      id: render-issue
      if: steps.generate-data.outputs.template-data-path
      uses: ./.github/actions/render-template
      with:
        template: .github/actions/manage-release-state/templates/issue.md.j2
        data: ${{ steps.generate-data.outputs.template-data-path }}
        is-file: true

    - name: Create tracking issue
      id: create-issue
      if: >-
        steps.find-issue.outputs.issue-exists == 'false' &&
        steps.render-issue.outputs.result
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPO: ${{ steps.prepare.outputs.repo }}
        VERSION: >-
          ${{ steps.fetch-state.outputs.version ||
            steps.initialize-state.outputs.version }}
        BODY: ${{ steps.render-issue.outputs.result }}
        PROJECT_NAME: ${{ inputs.project-name }}
        PROJECT_COLUMN: ${{ inputs.project-column }}
      run: |
        gh label create 'release-orchestration' \
          --repo "$REPO" \
          --color '#76ae65' \
          --force
        gh label create "release-v${VERSION}" --repo "$REPO" --force

        issue_url=$(gh issue create \
          --repo "$REPO" \
          --title "Release v${VERSION}" \
          --body "$BODY" \
          --label "release-orchestration,release-v${VERSION}")

        if [[ -n "$PROJECT_NAME" ]]; then
          repo_owner=$(dirname "$REPO")

          project_json=$(gh project list --owner "$repo_owner" --format json |
            jq --arg name "$PROJECT_NAME" \
            '.projects[] | select(.title == $name)')
          project_number=$(jq -r '.number' <<< "$project_json")
          project_id=$(jq -r '.id' <<< "$project_json")

          item_id=$(gh project item-add "$project_number" \
            --owner "$repo_owner" --url "$issue_url" --format json --jq '.id')

          if [[ -n "$PROJECT_COLUMN" ]]; then
            field_json=$(gh project field-list "$project_number" \
              --owner "$repo_owner" --format json)
            field_id=$(jq -r '.fields[] | select(.name == "Status") | .id' \
              <<< "$field_json")
            option_id=$(jq -r \
              --arg col "$PROJECT_COLUMN" '
              .fields[]
              | select(.name == "Status")
              | .options[]
              | select(.name == $col)
              | .id
            ' <<< "$field_json")

            gh project item-edit \
              --project-id "$project_id" \
              --id "$item_id" \
              --field-id "$field_id" \
              --single-select-option-id "$option_id"
          fi
        fi

        issue_num=${issue_url##*/}
        {
          echo "issue-number=${issue_num}"
          echo "issue-url=${issue_url}"
        } >> "$GITHUB_OUTPUT"

        echo "Created tracking issue: ${issue_url}"
      shell: bash

    - name: Update tracking issue
      id: update-issue
      if: >-
        steps.find-issue.outputs.issue-exists == 'true' &&
        steps.render-issue.outputs.result
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPO: ${{ steps.prepare.outputs.repo }}
        ISSUE_NUMBER: ${{ steps.find-issue.outputs.issue-number }}
        BODY: ${{ steps.render-issue.outputs.result }}
      run: |
        gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --body "$BODY" >/dev/null
        echo "Updated tracking issue ${REPO}#${ISSUE_NUMBER}"
      shell: bash

    - name: Render state comment
      id: render-comment
      if: steps.generate-data.outputs.template-data-path
      uses: ./.github/actions/render-template
      with:
        template: .github/actions/manage-release-state/templates/issue-comment.md.j2
        data: ${{ steps.generate-data.outputs.template-data-path }}
        is-file: true

    - name: Post state to issue
      if: steps.render-comment.outputs.result
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPO: ${{ steps.prepare.outputs.repo }}
        ISSUE_NUMBER: >-
          ${{ steps.create-issue.outputs.issue-number ||
            steps.find-issue.outputs.issue-number }}
        COMMENT: ${{ steps.render-comment.outputs.result }}
      run: |
        if [[ "${{ inputs.action }}" == 'finalize' ]] &&
          [[ "${{ inputs.close-on-finalization }}" == 'true' ]]; then
          gh issue close "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --comment "$COMMENT" \
            --reason 'completed'
        else
          comment_url=$(gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body-file - <<< "$COMMENT")

          echo "State posted to issue: ${comment_url}"
        fi
      shell: bash

    - name: Set outputs
      id: set-outputs
      env:
        REPO: ${{ steps.prepare.outputs.repo }}
        STATE: ${{ steps.update-components.outputs.state }}
        ISSUE_NUMBER: >-
          ${{ steps.create-issue.outputs.issue-number ||
            steps.find-issue.outputs.issue-number }}
        ISSUE_URL: >-
          ${{ steps.create-issue.outputs.issue-url ||
            steps.find-issue.outputs.issue-url }}
        COMPONENTS_PATH: >-
          ${{ steps.update-components.outputs.updated-components-path }}
      run: |
        if [[ -z "$ISSUE_NUMBER" ]]; then
          exit 0
        fi

        metadata_overwrite_tags=$(jq -r '.metadata.overwrite_tags // empty' \
          <<< "$STATE")
        {
          echo 'state<<EOF'
          echo "$STATE"
          echo 'EOF'
          echo "issue-number=${ISSUE_NUMBER}"
          echo "issue-url=${ISSUE_URL}"
          echo "components-path=${COMPONENTS_PATH}"
          echo "metadata-overwrite-tags=${metadata_overwrite_tags}"
        } >> "$GITHUB_OUTPUT"

        echo "State for issue ${REPO}#${ISSUE_NUMBER}:"
        echo "  Pending: $(jq -rc .pending <<< "$STATE")"
        echo "  Triggered: $(jq -rc .triggered <<< "$STATE")"
        echo "  PR created: $(jq -rc .pr_created <<< "$STATE")"
        echo "  PR merged: $(jq -rc .pr_merged <<< "$STATE")"
        echo "  Tagged: $(jq -rc .tagged <<< "$STATE")"
        echo "  Completed: $(jq -rc .completed <<< "$STATE")"
      shell: bash

    - name: Cleanup
      if: always() && steps.generate-data.outputs.template-data-path
      env:
        TMP_PATH: ${{ steps.generate-data.outputs.template-data-path }}
      run: |
        echo "Cleaning up temporary file: ${TMP_PATH}"
        rm -f "$TMP_PATH"
      shell: bash
