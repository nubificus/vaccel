version: 2
updates:
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      # Workaround for https://github.com/dependabot/dependabot-core/issues/6345
      - "/.github/actions/*"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci(deps)"
