name: Add Git Trailers to PR commits

on:
  workflow_call:
    inputs:
      actions-repo:
        type: string
        default: 'nubificus/vaccel'
      actions-rev:
        type: string
        default: 'main'
    secrets:
      VACCEL_BOT_PRIVATE_KEY:
        required: true
env:
  ACTIONS_REV: ${{ (github.repository != inputs.actions-repo) && inputs.actions-rev || '' }}

jobs:
  git-trailers:
    name: Add Git Trailers
    runs-on: base-2204-amd64
    steps:
      - name: Exit if PR is not rebaseable
        if: >-
          ${{ github.event.pull_request.rebaseable != null &&
            github.event.pull_request.rebaseable == false }}
        run: exit 1

      - name: Parse repository names
        id: parse-repos
        env:
          ACTIONS_REPO: ${{ inputs.actions-repo }}
        run: |
          {
            echo "repo-name=$(basename "$GITHUB_REPOSITORY")"
            echo "actions-repo-name=$(basename "$ACTIONS_REPO")"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Generate vaccel-bot token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.VACCEL_BOT_APP_ID }}
          private-key: ${{ secrets.VACCEL_BOT_PRIVATE_KEY }}
          repositories: |
            ${{ steps.parse-repos.outputs.repo-name }}
            ${{ steps.parse-repos.outputs.actions-repo-name }}
          permission-pull-requests: read
          permission-contents: write

      - name: Checkout .github directory
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github
          repository: ${{ inputs.actions-repo }}
          ref: ${{ env.ACTIONS_REV }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Append trailers
        uses: nubificus/git-trailers@v2
        with:
          user-info: .github/contributors.yaml
          token: ${{ steps.generate-token.outputs.token }}
          check-only: >-
            ${{ github.event_name == 'pull_request_review' && 'false' || 'true' }}
          fail-on-missing: >-
            ${{ github.event_name == 'pull_request_review' && 'false' || 'true' }}
