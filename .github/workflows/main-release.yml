name: Release Orchestrator
run-name: >-
  ${{ github.event_name == 'pull_request'
    && format('Release · check manifest (PR #{0})', github.event.pull_request.number)
    || github.event_name == 'push'
    && format('Release · start ({0})', inputs.release-version || 'manifest version')
    || inputs.action == 'resume'
    && format('Release · resume | {0} → {1}', inputs.component, inputs.status)
    || format('Release · {0}', inputs.action) }}

on:
  push:
    branches: [main]
    paths: ['.github/release-manifest.yml']

  pull_request:
    branches: [main]
    paths: ['.github/release-manifest.yml']

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        type: choice
        options: [start, resume, publish, check-manifest]
        default: 'start'
      component:
        description: 'Component updated (for "resume" action)'
        type: string
        required: false
      status:
        description: 'Component status (for "resume" action)'
        type: choice
        options: [pr-created, pr-merged, complete, failed, pending]
        default: 'complete'
      pr-url:
        description: >
          URL of created PR (for "resume" action with status "pr-created")
        type: string
        required: false
      artifacts-path:
        description: >
          Relative S3 path for component artifacts
          (for "resume" action with status "complete")
        type: string
        required: false
      release-version:
        description: >
          Version to release
          (e.g., 0.3.2 - defaults to manifest's release_version)
        type: string
        required: false
      run-url:
        description: >
          URL of the run that triggered the workflow (for "resume" action)
        type: string
        required: false
      component-release-url:
        description: >
          URL of the component's GitHub release (for "resume" action)
        type: string
        required: false
      force:
        description: >
          Force start an existing, in progress release (for "start" action)
        type: boolean
        default: false
      overwrite-tags:
        description: 'Overwrite existing tags (for "start" action)'
        type: boolean
        default: false
      fail-on-no-issue:
        description: 'Fail if no tracking issue is found (for "resume" action)'
        type: boolean
        default: true

permissions: read-all

jobs:
  check-pr-status:
    name: Check PR status
    uses: ./.github/workflows/check-pr-status.yml
    secrets: inherit

  check-run:
    needs: check-pr-status
    name: Check If Orchestrator Should Run
    runs-on: base-dind-2204-amd64
    outputs:
      action: ${{ steps.determine-action.outputs.action }}
      should-run: >-
        ${{ steps.check-version.outputs.should-run ||
          steps.handle-manual.outputs.should-run ||
          steps.handle-pr.outputs.should-run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup yq
        uses: dcarbone/install-yq-action@v1
        with:
          version: 'v4.52.2'

      - name: Determine action
        id: determine-action
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTION: ${{ inputs.action }}
          COMPONENT: ${{ inputs.component }}
          RUN_URL: ${{ inputs.run-url }}
        run: |
          case "$EVENT_NAME" in
            pull_request)
              echo 'action=check-manifest' >> "$GITHUB_OUTPUT"
              ;;
            push)
              echo 'action=start' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "action=${ACTION}" >> "$GITHUB_OUTPUT"
              ;;
          esac

          if [[ -n "$COMPONENT" ]] && [[ -n "$RUN_URL" ]]; then
            echo "## ${GITHUB_WORKFLOW}" >> "$GITHUB_STEP_SUMMARY"
            echo "Triggered by **$COMPONENT**: ${RUN_URL}" |
              tee -a "$GITHUB_STEP_SUMMARY"
          fi
        shell: bash

      - name: Handle pull request
        id: handle-pr
        if: github.event_name == 'pull_request'
        env:
          EXPECTS_CHECKS: ${{ needs.check-pr-status.outputs.expects-checks }}
        run: |
            echo "should-run=${EXPECTS_CHECKS}" >> "$GITHUB_OUTPUT"
            echo "Pull request - check manifest: ${EXPECTS_CHECKS}"
        shell: bash

      - name: Handle manual trigger
        id: handle-manual
        if: github.event_name == 'workflow_dispatch'
        env:
          ACTION: ${{ steps.determine-action.outputs.action }}
          FORCE: ${{ inputs.force }}
          RELEASE_VERSION: ${{ inputs.release-version }}
        run: |
          if [[ "$ACTION" != 'start' ]]
          then
            echo 'should-run=true' >> "$GITHUB_OUTPUT"
            echo "Manual ${ACTION} - will run"
            exit 0
          fi

          if [[ "$FORCE" == 'true' ]]; then
            echo 'should-run=true' >> "$GITHUB_OUTPUT"
            echo 'Manual start (forced) - will run'
            exit 0
          fi

          version="${RELEASE_VERSION:-"$(yq eval '.release.version' \
            .github/release-manifest.yml)"}"
          existing_issue=
          if [[ "$version" != 'null' ]]; then
            existing_issue=$(gh issue list \
              --label "release-v${version}" \
              --state open \
              --json number --jq '.[0].number' || echo '')
          fi

          if [[ -n "$existing_issue" ]]; then
            echo 'should-run=false' >> "$GITHUB_OUTPUT"
            echo "Release v${version} already in progress (issue #${existing_issue})"
            echo 'Use force=true to start anyway'
            exit 0
          fi

          echo 'should-run=true' >> "$GITHUB_OUTPUT"
          echo "Manual start - will run (no existing release found)"
        shell: bash

      - name: Check if version changed in push
        id: check-version
        if: github.event_name == 'push'
        env:
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          before_version=$(git show \
            "${EVENT_BEFORE}:.github/release-manifest.yml" \
            2>/dev/null | \
            yq eval '.release.version' - 2>/dev/null || echo '')
          after_version=$(yq eval '.release.version' .github/release-manifest.yml)

          echo "Before: ${before_version}"
          echo "After: ${after_version}"

          if [[ -z "$before_version" ]] || [[ "$before_version" == "null" ]]
          then
            echo "First push or manifest didn't exist before - will skip"
            echo 'should-run=false' >> "$GITHUB_OUTPUT"
            echo "version=${after_version}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$before_version" != "$after_version" ]]; then
            echo 'should-run=true' >> "$GITHUB_OUTPUT"
            echo "version=${after_version}" >> "$GITHUB_OUTPUT"
            echo "Version changed: ${before_version} → ${after_version} - will run"
          else
            echo 'should-run=false' >> "$GITHUB_OUTPUT"
            echo "Version unchanged: ${after_version} - will skip"
            echo 'To force a release, use workflow_dispatch with force=true'
          fi
        shell: bash

  orchestrate:
    needs: check-run
    name: Release Orchestrator
    if: needs.check-run.outputs.should-run == 'true'
    runs-on: base-dind-2204-amd64
    outputs:
      tracking-repo: ${{ steps.set-outputs.outputs.tracking-repo }}
      tracking-issue: ${{ steps.set-outputs.outputs.tracking-issue }}
      components-matrix: ${{ steps.set-outputs.outputs.components-matrix }}
      components-json: ${{ steps.set-outputs.outputs.components-json }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup yq
        uses: dcarbone/install-yq-action@v1
        with:
          version: 'v4.52.2'

      - name: Parse and cache manifest
        id: parse-manifest
        env:
          RELEASE_VERSION: ${{ inputs.release-version }}
        run: |
          MANIFEST_JSON="${RUNNER_TEMP}/manifest.json"
          COMPONENTS_JSON="${RUNNER_TEMP}/components.json"

          echo "Parsing manifest to JSON..."
          yq eval -o=json '.' .github/release-manifest.yml > "$MANIFEST_JSON"

          release_version="${RELEASE_VERSION:-"$(jq -r '.release.version' \
            "$MANIFEST_JSON")"}"
          if [[ "$release_version" == 'null' ]]; then
            echo '::error::No release version specified'
            exit 1
          fi

          release_name=$(jq -r '.release.name' "$MANIFEST_JSON")
          if [[ "$release_name" == 'null' ]]; then
            echo '::error::No release name specified'
            exit 1
          fi

          core_component=$(jq -r '.release.core_component' \
            "$MANIFEST_JSON")
          if ! jq -e ".components.\"${core_component}\"" "$MANIFEST_JSON" \
            > /dev/null
          then
            echo "::error::Core component '${core_component}' not found in components"
            exit 1
          fi
          safe_core_name="${core_component//_/}"

          tracking_repo=$(jq -r \
            --arg default "$GITHUB_REPOSITORY" \
            '.release.tracking.repository // $default' \
            "$MANIFEST_JSON")

          tracking_project_name=$(jq -r \
            '.release.tracking.project_name // ""' \
            "$MANIFEST_JSON")
          tracking_project_column=$(jq -r \
            '.release.tracking.project_column // ""' \
            "$MANIFEST_JSON")

          echo "Building canonical component data..."
          components=$(jq \
            --arg release_version "$release_version" \
            --arg core_component "$core_component" \
            --arg safe_core_name "$safe_core_name" '
            .components
            | with_entries(
                .value as $comp
                | .key as $name
                | .value =
                  (if $name == $core_component then
                     $comp + {
                       name: $name,
                       version: $release_version,
                       full_version: $release_version,
                       branch: "",
                       is_core: true,
                       all_dependencies: []
                     }
                   else
                     ($comp.version // $release_version) as $version
                     | (
                         if ($comp | has("depends_on") | not) then
                           [$core_component]
                         elif ($comp.depends_on | length == 0) then
                           []
                         else
                           ($comp.depends_on + [$core_component]) | unique
                         end
                       ) as $deps
                     | $comp + {
                         name: $name,
                         version: $version,
                         full_version:
                           (if $comp.version == null
                            then $release_version
                            else
                              "\($version)+\($safe_core_name).\($release_version)"
                            end),
                         branch: ($comp.branch // ""),
                         is_core: false,
                         all_dependencies: $deps
                       }
                   end)
              )
          ' "$MANIFEST_JSON")
          echo "$components" > "$COMPONENTS_JSON"

          component_repo_names=$(jq -r '. | keys[]' <<< "$components")

          {
            echo "manifest-path=${MANIFEST_JSON}"
            echo "components-path=${COMPONENTS_JSON}"
            echo "release-name=${release_name}"
            echo "version=${release_version}"
            echo "core-component=${core_component}"
            echo "tracking-repo=${tracking_repo}"
            echo "tracking-project-name=${tracking_project_name}"
            echo "tracking-project-column=${tracking_project_column}"
            echo 'component-repo-names<<EOF'
            echo "$component_repo_names"
            echo 'EOF'
            echo "tracking-repo-name=$(basename "$tracking_repo")"
          } >> "$GITHUB_OUTPUT"

          echo "Manifest parsed:"
          echo "  Release version: ${release_version}"
          echo "  Core component: ${core_component}"
          echo "  Tracking repository: ${tracking_repo}"
          if [[ -n "$tracking_project_name" ]]; then
            echo "  Tracking project: ${tracking_project_name}"
          fi
          echo "  Components: $(jq -rc '. | keys' <<< "$components")"
        shell: bash

      # Workaround for native concurrency cancelling more than one queued jobs.
      # See: https://github.com/orgs/community/discussions/12835
      - name: Wait for pending runs
        if: needs.check-run.outputs.action != 'check-manifest'
        uses: softprops/turnstyle@v3

      - name: Generate vaccel-bot token
        id: generate-token
        if: needs.check-run.outputs.action != 'check-manifest'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.VACCEL_BOT_CLIENT_ID }}
          private-key: ${{ secrets.VACCEL_BOT_PRIVATE_KEY }}
          repositories: |
            ${{ steps.parse-manifest.outputs.component-repo-names }}
            ${{ steps.parse-manifest.outputs.tracking-repo-name }}
          permission-actions: write
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-organization-projects: write

      - name: Get vaccel-bot info
        id: get-bot-info
        if: needs.check-run.outputs.action != 'check-manifest'
        uses: ./.github/actions/get-github-app-info
        with:
          app-slug: ${{ steps.generate-token.outputs.app-slug }}

      # --- START: Create issue, draft release, tag core component ---

      - name: Create tracking issue
        id: create-issue
        if: needs.check-run.outputs.action == 'start'
        uses: ./.github/actions/manage-release-state
        with:
          action: 'create'
          version: ${{ steps.parse-manifest.outputs.version }}
          components-path: ${{ steps.parse-manifest.outputs.components-path }}
          metadata-overwrite-tags: ${{ inputs.overwrite-tags || 'false' }}
          project-name: >-
            ${{ steps.parse-manifest.outputs.tracking-project-name }}
          project-column: >-
            ${{ steps.parse-manifest.outputs.tracking-project-column }}
          user-login: ${{ steps.get-bot-info.outputs.user-login }}
          repository: ${{ steps.parse-manifest.outputs.tracking-repo }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Generate draft release note data
        id: generate-draft
        if: needs.check-run.outputs.action == 'start'
        env:
          VERSION: ${{ steps.parse-manifest.outputs.version }}
          ISSUE_NUMBER: ${{ steps.create-issue.outputs.issue-number }}
          COMPONENTS_PATH: ${{ steps.create-issue.outputs.components-path }}
        run: |
          NOTES_PATH="${RUNNER_TEMP}/draft_notes.json"
          jq \
            --arg version "$VERSION" \
            --arg issue_number "$ISSUE_NUMBER" '
            {
              version: $version,
              tracking_issue: $issue_number,
              in_progress: true,
              components: .
            }' "$COMPONENTS_PATH" > "$NOTES_PATH"
            echo "notes-path=${NOTES_PATH}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Render draft release notes
        id: render-draft
        if: steps.generate-draft.outputs.notes-path
        uses: ./.github/actions/render-template
        with:
          template: .github/templates/release.md.j2
          data: ${{ steps.generate-draft.outputs.notes-path }}
          is-file: true

      - name: Create draft release
        if: needs.check-run.outputs.action == 'start'
        uses: ./.github/actions/manage-github-release
        env:
          RELEASE_NAME: ${{ steps.parse-manifest.outputs.release-name }}
          TAG: "v${{ steps.parse-manifest.outputs.version }}"
        with:
          tag: ${{ env.TAG }}
          title: ${{ format('{0} {1}', env.RELEASE_NAME, env.TAG) }}
          notes: ${{ steps.render-draft.outputs.result }}
          changelog: false
          draft: true
          token: ${{ steps.generate-token.outputs.token }}

      - name: Tag core component
        id: tag-core
        if: needs.check-run.outputs.action == 'start'
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ steps.parse-manifest.outputs.version }}
          ISSUE_NUMBER: ${{ steps.create-issue.outputs.issue-number }}
          STATE: ${{ steps.create-issue.outputs.state }}
          CORE_COMPONENT: ${{ steps.parse-manifest.outputs.core-component }}
          OVERWRITE_TAGS: >-
            ${{ steps.create-issue.outputs.metadata-overwrite-tags }}
        run: |
          status=tagged
          updated=false

          if git tag --points-at HEAD | grep -qx "$tag"; then
            echo "HEAD already tagged with ${tag}, skipping"

            if jq -e --argjson name "$CORE_COMPONENT" \
              '.pending | index($name) != null' <<< "$STATE" >/dev/null
            then
              updated=true
            fi
          else
            tag="v${VERSION}"
            sha=$(git rev-parse HEAD)

            if [[ "$OVERWRITE_TAGS" == 'true' ]]; then
              git tag -fd "$tag" 2>/dev/null || true
              git push origin ":refs/tags/${tag}" 2>/dev/null || true
            fi

            if gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
              --silent \
              -f ref="refs/tags/${tag}" \
              -f sha="$sha"
            then
              echo "Tagged ${CORE_COMPONENT} with ${tag}"
            else
              status=failed
              echo "Failed to tag ${CORE_COMPONENT} with ${tag}"
            fi

            updated=true
          fi

          {
            echo "component=${CORE_COMPONENT}"
            echo "status=${status}"
            echo "updated=${updated}"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Update core state
        id: update-core
        if: needs.check-run.outputs.action == 'start'
        env:
          ACTION: >-
            ${{ steps.tag-core.outputs.updated == 'true' && 'update' || 'get' }}
        uses: ./.github/actions/manage-release-state
        with:
          action: ${{ env.ACTION }}
          issue-number: ${{ steps.create-issue.outputs.issue-number }}
          components-path: ${{ steps.parse-manifest.outputs.components-path }}
          target-components: >-
            ${{ format('["{0}"]', steps.tag-core.outputs.component) }}
          statuses: ${{ format('["{0}"]', steps.tag-core.outputs.status) }}
          reset: ${{ steps.tag-core.outputs.updated }}
          user-login: ${{ steps.get-bot-info.outputs.user-login }}
          repository: ${{ steps.parse-manifest.outputs.tracking-repo }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Exit on core tag failure
        if: steps.tag-core.outputs.status == 'failed'
        env:
          COMPONENT: ${{ steps.tag-core.outputs.component }}
        run: |
          echo "::error::Failed to tag ${COMPONENT}"
          exit 1
        shell: bash

      # --- RESUME: Process next components ---

      - name: Update component status
        id: update-component
        if: >-
          needs.check-run.outputs.action == 'resume' ||
          needs.check-run.outputs.action == 'publish'
        uses: ./.github/actions/manage-release-state
        with:
          action: >-
            ${{ needs.check-run.outputs.action == 'resume' &&
              'update' || 'get' }}
          version: ${{ steps.parse-manifest.outputs.version }}
          components-path: ${{ steps.parse-manifest.outputs.components-path }}
          target-components: ${{ format('["{0}"]', inputs.component) }}
          statuses: ${{ format('["{0}"]', inputs.status) }}
          pr-urls: ${{ format('["{0}"]', inputs.pr-url) }}
          run-urls: ${{ format('["{0}"]', inputs.run-url) }}
          release-urls: ${{ format('["{0}"]', inputs.component-release-url) }}
          user-login: ${{ steps.get-bot-info.outputs.user-login }}
          fail-on-no-issue: ${{ inputs.fail-on-no-issue }}
          repository: ${{ steps.parse-manifest.outputs.tracking-repo }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Fetch and upload release artifacts
        if: >-
          steps.update-component.outputs.components-path &&
          inputs.component &&
          inputs.status == 'complete'
        uses: ./.github/actions/upload-release-artifacts
        env:
          COMPONENTS_PATH: ${{ steps.update-component.outputs.components-path }}
          RELEASE_TAG: "v${{ steps.parse-manifest.outputs.version }}"
        with:
          component: ${{ inputs.component }}
          components-path: ${{ env.COMPONENTS_PATH }}
          release-tag: ${{ env.RELEASE_TAG }}
          s3-subpath: ${{ inputs.artifacts-path }}
          s3-access-key: ${{ secrets.AWS_ACCESS_KEY }}
          s3-secret-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Trigger next components
        id: trigger-next
        if: >-
          steps.update-component.outputs.issue-number ||
          steps.update-core.outputs.issue-number
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          COMPONENTS_PATH: >-
            ${{ steps.update-component.outputs.components-path ||
              steps.update-core.outputs.components-path }}
          ISSUE_NUMBER: >-
            ${{ steps.update-component.outputs.issue-number ||
              steps.update-core.outputs.issue-number }}
          ISSUE_URL: >-
            ${{ steps.update-component.outputs.issue-url ||
              steps.update-core.outputs.issue-url }}
          VERSION: ${{ steps.parse-manifest.outputs.version }}
          CORE_COMPONENT: ${{ steps.parse-manifest.outputs.core-component }}
          OVERWRITE_TAGS: >-
            ${{ steps.update-component.outputs.metadata-overwrite-tags ||
              steps.update-core.outputs.metadata-overwrite-tags }}
        run: |
          echo "Checking which components are ready..."

          actions=$(jq -c \
            --arg repo_owner "$GITHUB_REPOSITORY_OWNER" \
            --arg core_component "$CORE_COMPONENT" '
            . as $all
            | to_entries
            | map(
                .key as $name
                | .value as $comp
                | ($comp.depends_on // []) as $explicit_deps
                | ($comp.all_dependencies // []) as $deps
                | (
                    if $comp.status == "pr-merged" then
                      "tag"
                    elif $comp.status == "pending" then
                      if ($deps | length == 0) or ($deps | all(
                        . as $d | ($all[$d].status == "complete")
                      )) then
                          "trigger"
                      else
                        empty
                      end
                    else
                      empty
                    end
                  ) as $action
                | select($action)
                | {
                    name: $name,
                    repo: "\($repo_owner)/\($comp.name)",
                    branch: $comp.branch,
                    full_version: $comp.full_version,
                    action: $action,
                    workflow_deps: (
                      $explicit_deps
                      | map({name: ., version: $all[.].full_version})
                    )
                  }
              )
          ' "$COMPONENTS_PATH")

          run_urls='[]'
          statuses='[]'
          triggered='[]'
          tagged='[]'
          failed_tags='[]'
          failed_triggers='[]'

          while read -r comp; do
            name=$(jq -r '.name' <<< "$comp")
            repo=$(jq -r '.repo' <<< "$comp")
            branch=$(jq -r '.branch' <<< "$comp")
            full_version=$(jq -r '.full_version' <<< "$comp")
            action=$(jq -r '.action' <<< "$comp")
            workflow_deps=$(jq -c '.workflow_deps' <<< "$comp")

            if [[ "$action" == "tag" ]]; then
              tag="v${full_version}"
              tag_branch="${branch:-main}"
              sha=$(gh api "repos/${repo}/git/refs/heads/${tag_branch}" \
                --jq '.object.sha')

              echo "Tagging ${name} with ${tag}"
              if [[ "$OVERWRITE_TAGS" == 'true' ]]; then
                gh api "repos/${repo}/git/refs/tags/${tag}" \
                  --silent \
                  -X DELETE \
                  2>/dev/null || true
              fi

              if gh api "repos/${repo}/git/refs" \
                  --silent \
                -f ref="refs/tags/${tag}" \
                -f sha="$sha"
              then
                statuses=$(jq -c --arg s "tagged" '. + [$s]' <<< "$statuses")
                tagged=$(jq -c --arg n "$name" '. + [$n]' <<< "$tagged")
              else
                statuses=$(jq -c --arg s "failed" '. + [$s]' <<< "$statuses")
                failed_tags=$(jq -c --arg n "$name" '. + [$n]' \
                  <<< "$failed_tags")
              fi
            elif [[ "$action" == "trigger" ]]; then
              echo "Triggering prepare-release for ${name} (${full_version})"
              status=$(gh api \
                "repos/${repo}/contents/.github/workflows/dispatch-prepare-release.yml" \
                --silent -i 2>&1 | head -1 | awk '{print $2}' || true)

              if [[ "$status" == "200" ]]; then
                target_repo="$repo"
              else
                target_repo="$GITHUB_REPOSITORY"
              fi

              if run_url=$(gh workflow run dispatch-prepare-release.yml \
                --repo "$target_repo" \
                -f version="$full_version" \
                -f component="$name" \
                -f branch="$branch" \
                -f core-component="$CORE_COMPONENT" \
                -f core-version="$VERSION" \
                -f tracking-issue-url="$ISSUE_URL" \
                -f orchestrator-repo="$GITHUB_REPOSITORY" \
                -f dependencies="$workflow_deps")
              then
                statuses=$(jq -c --arg s "triggered" '. + [$s]' <<< "$statuses")
                run_urls=$(jq -c --arg url "$run_url" '. + [$url]' \
                  <<< "$run_urls")
                triggered=$(jq -c --arg n "$name" '. + [$n]' <<< "$triggered")
                echo "└─ Run triggered: ${run_url}"
              else
                statuses=$(jq -c --arg s "failed" '. + [$s]' <<< "$statuses")
                run_urls=$(jq -c '. + [""]' <<< "$run_urls")
                failed_triggers=$(jq -c --arg n "$name" '. + [$n]' \
                  <<< "$failed_triggers")
              fi
            fi
          done < <(jq -c '.[]' <<< "$actions")

          components=$(jq -rc '[.[] | .name]' <<< "$actions")
          has_failures=$(jq -c 'any(. == "failed")' <<< "$statuses")

          {
            echo "components=${components}"
            echo "statuses=${statuses}"
            echo "run-urls=${run_urls}"
            echo "has-failures=${has_failures}"
          } >> "$GITHUB_OUTPUT"

          printf "\nTrigger step complete:\n"
          echo "  Triggered: ${triggered}"
          echo "  Tagged: ${tagged}"
          if [[ "$failed_triggers" != '[]' ]]; then
            echo "  Failed triggers: ${failed_triggers}"
          fi
          if [[ "$failed_tags" != '[]' ]]; then
            echo "  Failed tags: ${failed_tags}"
          fi
        shell: bash

      - name: Update tracking issue with triggered/tagged
        id: update-triggered
        if: >-
          steps.trigger-next.outputs.components &&
          steps.trigger-next.outputs.components != '[]'
        uses: ./.github/actions/manage-release-state
        with:
          action: 'update'
          issue-number: >-
            ${{ steps.update-component.outputs.issue-number ||
              steps.update-core.outputs.issue-number }}
          components-path: >-
            ${{ steps.update-component.outputs.components-path ||
              steps.update-core.outputs.components-path }}
          target-components: ${{ steps.trigger-next.outputs.components }}
          statuses: ${{ steps.trigger-next.outputs.statuses }}
          run-urls: ${{ steps.trigger-next.outputs.run-urls }}
          user-login: ${{ steps.get-bot-info.outputs.user-login }}
          repository: ${{ steps.parse-manifest.outputs.tracking-repo }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Exit on trigger/tag failure
        if: steps.trigger-next.outputs.has-failures == 'true'
        run: |
          echo "::error::Failed to trigger/tag components"
          exit 1
        shell: bash

      - name: Check if all components are complete
        id: check-complete
        if: >-
          steps.update-component.outputs.issue-number ||
          steps.update-core.outputs.issue-number
        env:
          COMPONENTS_PATH: >-
            ${{ steps.update-triggered.outputs.components-path ||
              steps.update-component.outputs.components-path ||
              steps.update-core.outputs.components-path }}
          VERSION: ${{ steps.parse-manifest.outputs.version }}
          ISSUE_NUMBER: >-
            ${{ steps.update-component.outputs.issue-number ||
              steps.update-core.outputs.issue-number }}
        run: |
          incomplete=$(jq -rc '
            to_entries
            | map(select(.value.status != "complete") | .key)
          ' "$COMPONENTS_PATH")

          if [[ "$(jq 'length' <<< "$incomplete")" -ne 0 ]]; then
            echo 'is-complete=false' >> "$GITHUB_OUTPUT"
            echo "Some components are not complete:"
            echo "$incomplete"
            exit 0
          fi

          {
            echo 'is-complete=true'
            echo "version=${VERSION}"
            echo "components-path=${COMPONENTS_PATH}"
            echo "issue-number=${ISSUE_NUMBER}"
          } >> "$GITHUB_OUTPUT"
          echo "All components complete"
        shell: bash

      - name: Generate final release note data
        id: generate-final
        if: >-
          steps.check-complete.outputs.is-complete == 'true' &&
          needs.check-run.outputs.action != 'publish'
        env:
          VERSION: ${{ steps.check-complete.outputs.version }}
          ISSUE_NUMBER: ${{ steps.check-complete.outputs.issue-number }}
          COMPONENTS_PATH: ${{ steps.check-complete.outputs.components-path }}
        run: |
          NOTES_PATH="${RUNNER_TEMP}/final_notes.json"
          jq \
            --arg version "$VERSION" \
            --arg tracking_issue "$ISSUE_NUMBER" '
            {
              version: $version,
              tracking_issue: $tracking_issue,
              in_progress: false,
              components: .
            }' "$COMPONENTS_PATH" > "$NOTES_PATH"
            echo "notes-path=${NOTES_PATH}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Render final release notes
        id: render-final
        if: steps.generate-final.outputs.notes-path
        uses: ./.github/actions/render-template
        with:
          template: .github/templates/release.md.j2
          data: ${{ steps.generate-final.outputs.notes-path }}
          is-file: true

      - name: Finalize release draft
        if: steps.render-final.outputs.result
        uses: ./.github/actions/manage-github-release
        with:
          tag: "v${{ steps.parse-manifest.outputs.version }}"
          notes: ${{ steps.render-final.outputs.result }}
          draft: true
          token: ${{ steps.generate-token.outputs.token }}

      - name: Finalize release state
        if: >-
          steps.check-complete.outputs.is-complete == 'true' &&
          needs.check-run.outputs.action != 'publish'
        uses: ./.github/actions/manage-release-state
        with:
          action: 'finalize'
          issue-number: ${{ steps.check-complete.outputs.issue-number }}
          components-path: ${{ steps.check-complete.outputs.components-path }}
          user-login: ${{ steps.get-bot-info.outputs.user-login }}
          repository: ${{ steps.parse-manifest.outputs.tracking-repo }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Set outputs
        id: set-outputs
        if: >-
          steps.check-complete.outputs.is-complete == 'true' &&
          needs.check-run.outputs.action == 'publish'
        env:
          TRACKING_REPO: ${{ steps.parse-manifest.outputs.tracking-repo }}
          ISSUE_NUMBER: ${{ steps.check-complete.outputs.issue-number }}
          COMPONENTS_PATH: ${{ steps.check-complete.outputs.components-path }}
        run: |
          components_matrix=$(jq -c '[to_entries[] | .value]' \
            "$COMPONENTS_PATH")
          {
            echo "tracking-repo=${TRACKING_REPO}"
            echo "tracking-issue=${ISSUE_NUMBER}"
            echo "components-matrix=${components_matrix}"
            echo 'components-json<<EOF'
            cat "$COMPONENTS_PATH"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Cleanup
        if: always() && steps.generate-draft.outputs.notes-path
        env:
          TMP_DRAFT_PATH: ${{ steps.generate-draft.outputs.notes-path }}
          TMP_FINAL_PATH: ${{ steps.generate-final.outputs.notes-path }}
        run: |
          echo "Cleaning up temporary file: ${TMP_DRAFT_PATH}"
          rm -f "$TMP_DRAFT_PATH"
          if [[ -z "$TMP_FINAL_PATH" ]]; then
            echo "Cleaning up temporary file: ${TMP_FINAL_PATH}"
            rm -f "$TMP_FINAL_PATH"
          fi
        shell: bash

  publish:
    needs: [check-run, orchestrate]
    name: Publish Release
    if: >-
      needs.check-run.outputs.action == 'publish' &&
      needs.orchestrate.outputs.components-matrix
    runs-on: base-dind-2204-amd64
    strategy:
      max-parallel: 1
      matrix:
        component: ${{ fromJSON(needs.orchestrate.outputs.components-matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github

      - name: Prepare action
        id: prepare
        env:
          COMPONENTS_JSON: ${{ needs.orchestrate.outputs.components-json }}
          TRACKING_REPO: ${{ needs.orchestrate.outputs.tracking-repo }}
        run: |
          COMPONENTS_PATH="${RUNNER_TEMP}/components.json"
          echo "$COMPONENTS_JSON" > "$COMPONENTS_PATH"

          core_component=$(jq -r \
            '[. | values[] | select(.is_core == true)] | .[0].name' \
            <<< "$COMPONENTS_JSON")

          {
            echo "components-path=${COMPONENTS_PATH}"
            echo "core-component=${core_component}"
            echo "tracking-repo-name=$(basename "$TRACKING_REPO")"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Generate vaccel-bot token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.VACCEL_BOT_CLIENT_ID }}
          private-key: ${{ secrets.VACCEL_BOT_PRIVATE_KEY }}
          repositories: |
            ${{ matrix.component.name }}
            ${{ steps.prepare.outputs.core-component }}
            ${{ steps.prepare.outputs.tracking-repo-name }}
          permission-actions: write
          permission-contents: write
          permission-issues: write
          permission-organization-projects: write

      - name: Get vaccel-bot info
        id: get-bot-info
        uses: ./.github/actions/get-github-app-info
        with:
          app-slug: ${{ steps.generate-token.outputs.app-slug }}

      - name: "Publish ${{ matrix.component.name }} release"
        id: publish-release
        uses: ./.github/actions/manage-github-release
        with:
          tag: "v${{ matrix.component.full_version }}"
          repository: >-
            ${{ format('{0}/{1}',
              github.repository_owner, matrix.component.name) }}
          changelog: false
          create-if-missing: false
          token: ${{ steps.generate-token.outputs.token }}

      - name: "Update ${{ matrix.component.name }} release URL"
        uses: ./.github/actions/manage-release-state
        with:
          action: 'update'
          issue-number: ${{ needs.orchestrate.outputs.tracking-issue }}
          components-path: ${{ steps.prepare.outputs.components-path }}
          target-components: ${{ format('["{0}"]', matrix.component.name) }}
          statuses: ${{ format('["{0}"]', 'complete') }}
          release-urls: >-
            ${{ format('["{0}"]', steps.publish-release.outputs.url) }}
          user-login: ${{ steps.get-bot-info.outputs.user-login }}
          repository: ${{ needs.orchestrate.outputs.tracking-repo }}
          token: ${{ steps.generate-token.outputs.token }}

  complete:
    needs: [check-run, orchestrate, publish]
    name: Complete Release
    if: >-
      needs.check-run.outputs.action == 'publish' &&
      needs.orchestrate.outputs.components-json
    runs-on: base-dind-2204-amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github

      - name: Prepare action
        id: prepare
        env:
          COMPONENTS_JSON: ${{ needs.orchestrate.outputs.components-json }}
          TRACKING_REPO: ${{ needs.orchestrate.outputs.tracking-repo }}
        run: |
          COMPONENTS_PATH="${RUNNER_TEMP}/components.json"
          echo "$COMPONENTS_JSON" > "$COMPONENTS_PATH"

          core_component=$(jq -r \
            '[. | values[] | select(.is_core == true)] | .[0].name' \
            <<< "$COMPONENTS_JSON")

          {
            echo "components-path=${COMPONENTS_PATH}"
            echo "core-component=${core_component}"
            echo "tracking-repo-name=$(basename "$TRACKING_REPO")"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Generate vaccel-bot token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.VACCEL_BOT_CLIENT_ID }}
          private-key: ${{ secrets.VACCEL_BOT_PRIVATE_KEY }}
          repositories: |
            ${{ steps.prepare.outputs.core-component }}
            ${{ steps.prepare.outputs.tracking-repo-name }}
          permission-actions: write
          permission-contents: write
          permission-issues: write
          permission-organization-projects: write

      - name: Get vaccel-bot info
        id: get-bot-info
        uses: ./.github/actions/get-github-app-info
        with:
          app-slug: ${{ steps.generate-token.outputs.app-slug }}

      - name: Complete release
        uses: ./.github/actions/manage-release-state
        with:
          action: 'complete'
          issue-number: ${{ needs.orchestrate.outputs.tracking-issue }}
          components-path: ${{ steps.prepare.outputs.components-path }}
          user-login: ${{ steps.get-bot-info.outputs.user-login }}
          repository: ${{ needs.orchestrate.outputs.tracking-repo }}
          token: ${{ steps.generate-token.outputs.token }}
