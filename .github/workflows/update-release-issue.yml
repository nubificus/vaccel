name: Update Release Issue

on:
  workflow_call:
    inputs:
      core-component:
        description: >
          Specify core component (in case it is not detectable but the tag/label
          scheme)
        type: string
        required: false
      artifacts-path:
        description: 'Relative S3 path for component artifacts'
        type: string
        required: false
    secrets:
      VACCEL_BOT_PRIVATE_KEY:
        required: true

permissions: read-all

env:
  DEFAULT_CORE_COMPONENT: 'vaccel'

jobs:
  update-release:
    name: Update Release Issue
    runs-on: base-2204-amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check if event refers to a release
        id: check-release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_CORE_COMPONENT: ${{ inputs.core-component }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Event is tag
            is_release=true
            is_prepare_release=false
            version=${GITHUB_REF#refs/tags/v}
            echo "Event is a tag for release v${version}"
          else
            # Check if last merged PR was prepare release
            echo "Event is not tag; searching for associated PR..."
            is_release=false

            pr_url=$(git log -1 --pretty=%B | git interpret-trailers --parse |
              awk -F': ' '$1=="PR"{print $2; exit}')
            if [[ -z "$pr_url" ]]; then
              echo "  No PR trailer found in commits; trying GH API"

              pr_url=
              for i in 1 2 3; do
                pr_url=$(gh api \
                  "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
                  --jq '.[0].html_url // empty' 2>/dev/null)
                if [[ -n "$pr_url" ]]; then
                  break
                fi
                sleep $((i * 5))
              done

              if [[ -z "$pr_url" ]]; then
                echo "  No PR associated with commit ${GITHUB_SHA}"
              fi
            fi

            version=
            if [[ -n "$pr_url" ]]; then
              version=$(gh pr view "$pr_url" --json labels |
                jq -r '
                  .labels[].name
                  | select(startswith("release-v"))
                  | sub("^release-v"; "")
                ')
            fi

            if [[ -n "$version" ]]; then
              is_prepare_release=true
              echo "Event is a push to prepare release v${version}"
            else
              is_prepare_release=false
              echo "Event is not associated with a release"
            fi
          fi

          component="$(basename "$GITHUB_REPOSITORY")"
          case "$version" in
            *+*.*)
              core_str="${version#*+}"
              core_component="${INPUT_CORE_COMPONENT:-"${core_str%%.*}"}"
              core_version="${core_str#*.}"
              ;;
            *)
              core_component="${INPUT_CORE_COMPONENT:-"$DEFAULT_CORE_COMPONENT"}"
              core_version="$version"
              ;;
          esac
          tracking_repo="${GITHUB_REPOSITORY_OWNER}/${core_component}"

          {
            echo "is-release=${is_release}"
            echo "is-prepare-release=${is_prepare_release}"
            echo "component=${component}"
            echo "version=${version}"
            echo "core-component=${core_component}"
            echo "core-version=${core_version}"
            echo "tracking-repo=${tracking_repo}"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Generate vaccel-bot token
        id: generate-token
        if: >-
          steps.check-release.outputs.is-release == 'true' ||
          steps.check-release.outputs.is-prepare-release == 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.VACCEL_BOT_CLIENT_ID }}
          private-key: ${{ secrets.VACCEL_BOT_PRIVATE_KEY }}
          repositories: ${{ steps.check-release.outputs.core-component }}
          permission-contents: read
          permission-issues: read
          permission-actions: write

      - name: Check for active orchestration
        id: check-orchestration
        if: >-
          steps.check-release.outputs.is-release == 'true' ||
          steps.check-release.outputs.is-prepare-release == 'true'
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          TRACKING_REPO: ${{ steps.check-release.outputs.tracking-repo }}
          COMPONENT: ${{ steps.check-release.outputs.component }}
          VERSION: ${{ steps.check-release.outputs.version }}
          CORE_COMPONENT: ${{ steps.check-release.outputs.core-component }}
          CORE_VERSION: ${{ steps.check-release.outputs.core-version }}
        run: |
          tracking_issue=$(gh issue list \
            --repo "$TRACKING_REPO" \
            --label "release-v${CORE_VERSION}" \
            --state open \
            --json number --jq '.[0].number' || echo '')

          {
            echo "components=${components}"
            echo "tracking-issue=${tracking_issue}"
          } >> "$GITHUB_OUTPUT"

          if [[ -n "$tracking_issue" ]]; then
            echo 'is-orchestrated=true' >> "$GITHUB_OUTPUT"
            echo "Found active orchestration in ${TRACKING_REPO}#${tracking_issue}:"
          else
            echo 'is-orchestrated=false' >> "$GITHUB_OUTPUT"
            echo "No orchestration found - this is a standalone release"
          fi

          echo "Release info:"
          echo "  Component: ${COMPONENT}"
          echo "  Version: ${VERSION}"
          echo "  Core component: ${CORE_COMPONENT}"
          echo "  Core version: ${CORE_VERSION}"
        shell: bash

      - name: Trigger orchestrator
        if: steps.check-orchestration.outputs.is-orchestrated == 'true'
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          TRACKING_REPO: ${{ steps.check-release.outputs.tracking-repo }}
          COMPONENT: ${{ steps.check-release.outputs.component }}
          STATUS: >-
            ${{ steps.check-release.outputs.is-prepare-release == 'true' &&
              'pr-merged' || 'complete' }}
          CORE_VERSION: ${{ steps.check-release.outputs.core-version }}
          ARTIFACTS_PATH: ${{ inputs.artifacts-path }}
        run: |
          gh workflow run main-release.yml \
            --repo "$TRACKING_REPO" \
            --ref main \
            -f action=resume \
            -f component="$COMPONENT" \
            -f status="$STATUS" \
            -f release-version="$CORE_VERSION" \
            -f artifacts-path="$ARTIFACTS_PATH"
          echo "Orchestrator notified of status: ${STATUS}"
        shell: bash
