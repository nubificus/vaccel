# SPDX-License-Identifier: Apache-2.0

name: Validate Files and Commit Messages

on:
  workflow_call:
    inputs:
      actions-repo:
        description: 'Repository with remote actions'
        type: string
        default: 'nubificus/vaccel'
      actions-ref:
        description: 'Branch, tag or SHA of remote actions repository'
        type: string
        default: 'main'
    secrets:
      VACCEL_BOT_PRIVATE_KEY:
        required: false

permissions: read-all

env:
  ACTIONS_REF: >-
    ${{ github.repository != inputs.actions-repo && inputs.actions-ref || '' }}

jobs:
  linter-commitlint:
    name: Lint Commit Messages
    runs-on: base-dind-2204-amd64
    steps:
      - name: Parse repository names
        id: parse-repos
        env:
          ACTIONS_REPO: ${{ inputs.actions-repo }}
        run: |
          {
            echo "repo-name=$(basename "$GITHUB_REPOSITORY")"
            echo "actions-repo-name=$(basename "$ACTIONS_REPO")"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Generate initialization vaccel-bot token
        id: generate-init-token
        if: vars.VACCEL_BOT_CLIENT_ID
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.VACCEL_BOT_CLIENT_ID }}
          private-key: ${{ secrets.VACCEL_BOT_PRIVATE_KEY }}
          repositories: |
            ${{ steps.parse-repos.outputs.repo-name }}
            ${{ steps.parse-repos.outputs.actions-repo-name }}
          permission-contents: read

      - name: Checkout .github directory
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github
          repository: ${{ inputs.actions-repo }}
          ref: ${{ env.ACTIONS_REF }}
          token: ${{ steps.generate-init-token.outputs.token || github.token }}

      - name: Initialize workspace
        uses: ./.github/actions/initialize-workspace
        with:
          submodules: 'false'
          remote-actions-repo: ${{ inputs.actions-repo }}
          token: ${{ steps.generate-init-token.outputs.token || github.token }}

      - name: Run commitlint
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .github/linters/commitlint.config.mjs

  linter-typos:
    name: Spell Check Repo
    runs-on: base-dind-2204-amd64
    steps:
      - name: Parse repository names
        id: parse-repos
        env:
          ACTIONS_REPO: ${{ inputs.actions-repo }}
        run: |
          {
            echo "repo-name=$(basename "$GITHUB_REPOSITORY")"
            echo "actions-repo-name=$(basename "$ACTIONS_REPO")"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Generate initialization vaccel-bot token
        id: generate-init-token
        if: vars.VACCEL_BOT_CLIENT_ID
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.VACCEL_BOT_CLIENT_ID }}
          private-key: ${{ secrets.VACCEL_BOT_PRIVATE_KEY }}
          repositories: |
            ${{ steps.parse-repos.outputs.repo-name }}
            ${{ steps.parse-repos.outputs.actions-repo-name }}
          permission-contents: read

      - name: Checkout .github directory
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github
          repository: ${{ inputs.actions-repo }}
          ref: ${{ env.ACTIONS_REF }}
          token: ${{ steps.generate-init-token.outputs.token || github.token }}

      - name: Initialize workspace
        uses: ./.github/actions/initialize-workspace
        with:
          submodules: 'false'
          remote-actions-repo: ${{ inputs.actions-repo }}
          token: ${{ steps.generate-init-token.outputs.token || github.token }}

      - name: Spell check
        uses: crate-ci/typos@master
        with:
          config: .github/linters/typos.toml

  linter-license-eye:
    name: Check License Headers
    runs-on: base-dind-2204-amd64
    steps:
      - name: Parse repository names
        id: parse-repos
        env:
          ACTIONS_REPO: ${{ inputs.actions-repo }}
        run: |
          {
            echo "repo-name=$(basename "$GITHUB_REPOSITORY")"
            echo "actions-repo-name=$(basename "$ACTIONS_REPO")"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Generate initialization vaccel-bot token
        id: generate-init-token
        if: vars.VACCEL_BOT_CLIENT_ID
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.VACCEL_BOT_CLIENT_ID }}
          private-key: ${{ secrets.VACCEL_BOT_PRIVATE_KEY }}
          repositories: |
            ${{ steps.parse-repos.outputs.repo-name }}
            ${{ steps.parse-repos.outputs.actions-repo-name }}
          permission-contents: read

      - name: Checkout .github directory
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github
          repository: ${{ inputs.actions-repo }}
          ref: ${{ env.ACTIONS_REF }}
          token: ${{ steps.generate-init-token.outputs.token || github.token }}

      - name: Initialize workspace
        uses: ./.github/actions/initialize-workspace
        with:
          submodules: 'false'
          remote-actions-repo: ${{ inputs.actions-repo }}
          token: ${{ steps.generate-init-token.outputs.token || github.token }}

      - name: Generate linter vaccel-bot token
        id: generate-linter-token
        if: vars.VACCEL_BOT_CLIENT_ID
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.VACCEL_BOT_CLIENT_ID }}
          private-key: ${{ secrets.VACCEL_BOT_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write

      - name: Prepare GO environment
        run: |
          echo "Unset GO PATH, as the following action conflicts with the already installed version"
          export GOPATH=
          export GOTOOLDIR=
          export GOROOT=
          {
            echo "GOPATH=${GOPATH}"
            echo "GOTOOLDIR=${GOTOOLDIR}"
            echo "GOROOT=${GOROOT}"
          } >> "$GITHUB_ENV"

      - name: Run license-eye
        uses: apache/skywalking-eyes/header@main
        with:
          config: .github/linters/licenserc.yml
          token: >-
            ${{ steps.generate-linter-token.outputs.token || github.token }}
